<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовое Судоку</title>
    <script src="https://unpkg.com/@sberdevices/assistant-client@latest/dist/assistant.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #21a038; margin-bottom: 5px; }
        .instructions { color: #aaaaaa; font-size: 14px; margin-bottom: 20px; }
        .grid-container {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 45px);
            gap: 1px;
            background-color: #444;
            padding: 3px;
            border-radius: 4px;
        }
        .cell {
            width: 45px;
            height: 45px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            user-select: none;
        }
        .header-cell {
            background-color: transparent;
            color: #888;
            font-size: 14px;
        }
        /* Жирные границы для секторов 3х3 */
        .cell:nth-child(3n+1):not(.header-cell) { border-right: 2px solid #555; }
        .cell:nth-child(9n+1):not(.header-cell) { border-right: none; }
        
        .row-delimiter {
            grid-column: span 10;
            height: 2px;
            background-color: #555;
        }
        .user-moved {
            color: #21a038;
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>Судоку Голос 🧩</h1>
    <div class="instructions">Управляйте голосом: <b>"Поставь 5 на Б 3"</b> или скажите <b>"Новая игра"</b></div>

    <div class="grid-container">
        <div class="grid" id="board"></div>
    </div>

    <script>
        const letters = [' ', 'А', 'Б', 'В', 'Г', 'Д', 'Е', 'Ж', 'З', 'И'];
        const boardEl = document.getElementById('board');
        let assistant;

        // Инициализируем Assistant SDK
        if (window.createAssistant) {
            assistant = window.createAssistant({
                getState: () => ({})
            });

            // Подписываемся на события (директивы) от бэкенда через Салют
            assistant.on('data', (event) => {
                if (event.type === 'smart_app_data' && event.payload && event.payload.directives) {
                    const directive = event.payload.directives[0];
                    if (directive.type === 'SUDOKU_INIT') {
                        buildGrid(directive.board);
                    } else if (directive.type === 'SUDOKU_MOVE') {
                        applyMove(directive.row, directive.col, directive.val);
                    }
                }
            });
        }

        function buildGrid(matrix) {
            boardEl.innerHTML = '';
            
            // Верхняя строка с буквами-координатами
            letters.forEach(letter => {
                boardEl.innerHTML += <div class="cell header-cell">${letter}</div>;
            });

            // Отрисовка игровых ячеек
            for (let r = 0; r < 9; r++) {
                // Номер строки в начале каждого ряда
                boardEl.innerHTML += <div class="cell header-cell">${r + 1}</div>;
                
                for (let c = 0; c < 9; c++) {
                    const value = matrix[r][c];
                    const displayValue = value !== 0 ? value : '';
                    boardEl.innerHTML += <div class="cell" id="cell-${r}-${c}">${displayValue}</div>;
                }
// Добавляем визуальный разделитель после каждых 3 строк
                if ((r + 1) % 3 === 0 && r < 8) {
                    // Перенос и разделитель сектора
                    boardEl.innerHTML += <div class="row-delimiter"></div>;
                }
            }
        }

        function applyMove(row, col, val) {
            const cell = document.getElementById(`cell-${row}-${col}`);
            if (cell) {
                cell.innerText = val;
                cell.classList.add('user-moved');
            }
        }

        // При первой загрузке отправляем скрытый интент на сервер, чтобы сгенерировать поле
        window.addEventListener('load', () => {
            setTimeout(() => {
                if(assistant) {
                    assistant.sendData({ action: { action_id: 'new_game' } });
                }
            }, 1000);
        });
    </script>
</body>
</html>
